name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip check
      - name: Sanity-check editable install
        run: |
          python -c "import cognis; import cognis.dsp.fir_executor as fir; print(f'editable_install_ok native_available={fir._NATIVE_FIR_AVAILABLE}')"
      - name: Run tests
        run: |
          pytest -q
